<div class="extension-block preset-binder-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Preset Binder</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label">
                <span>요술봉 메뉴 버튼 표시</span>
                <input type="checkbox" id="preset_binder_show_wand">
            </label>
            <label class="checkbox_label">
                <span>창 위치와 크기 기억</span>
                <input type="checkbox" id="preset_binder_remember_window">
            </label>
            <button id="preset_binder_reset_window" class="menu_button">
                <i class="fa-solid fa-window-restore"></i>
                창 위치 초기화
            </button>
        </div>
    </div>
</div>
